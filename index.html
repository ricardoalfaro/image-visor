<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Visor</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Image Visor</h1>
          <p id="folderSummary">Selecciona una carpeta local para empezar.</p>
        </div>
        <div class="actions">
          <label class="button primary">
            Abrir carpeta
            <input id="folderInput" type="file" accept="image/*" webkitdirectory multiple>
          </label>
          <button id="serverButton" class="button" type="button">Cargar servidor</button>
          <button id="fullscreenButton" class="button" type="button" disabled>Pantalla completa</button>
        </div>
      </header>

      <section class="viewer-layout" aria-label="Visor de imagenes">
        <section class="stage-panel">
          <div id="emptyState" class="empty-state">
            <h2>Elige una carpeta</h2>
            <p>El visor cargara una imagen a la vez desde una carpeta local o desde el servidor local.</p>
          </div>

          <div id="stage" class="stage is-hidden">
            <button id="previousButton" class="nav-button previous" type="button" aria-label="Imagen anterior">‹</button>
            <figure class="image-frame">
              <img id="activeImage" alt="">
              <figcaption>
                <span id="activeName"></span>
                <span id="activePosition"></span>
              </figcaption>
            </figure>
            <button id="nextButton" class="nav-button next" type="button" aria-label="Imagen siguiente">›</button>
          </div>

          <footer class="controls" aria-label="Controles del visor">
            <button id="zoomOutButton" class="icon-button" type="button" disabled aria-label="Alejar">-</button>
            <input id="zoomRange" type="range" min="25" max="300" step="5" value="100" disabled aria-label="Zoom">
            <button id="zoomInButton" class="icon-button" type="button" disabled aria-label="Acercar">+</button>
            <button id="resetZoomButton" class="button compact" type="button" disabled>100%</button>
          </footer>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
