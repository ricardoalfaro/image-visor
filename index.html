<!doctype html>
<html lang="es" data-theme="auto">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visualizador de imágenes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="theme-bar" aria-label="Preferencia de apariencia">
        <button id="themeToggleButton" class="icon-button theme-toggle" type="button" aria-label="Modo automático">
          <svg class="theme-icon" data-theme-icon="light" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"></path></svg>
          <svg class="theme-icon" data-theme-icon="auto" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="2"></rect><path d="M8 20h8M12 16v4"></path></svg>
          <svg class="theme-icon" data-theme-icon="dark" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A7.5 7.5 0 0 1 9.5 4 8 8 0 1 0 20 14.5Z"></path></svg>
        </button>
      </header>

      <section class="viewer-layout" aria-label="Visualizador de imágenes">
        <div class="welcome-copy">
          <h1>Visualizador<br>de imágenes</h1>
        </div>

        <section id="stage" class="stage is-hidden">
          <button id="previousButton" class="nav-button previous is-hidden" type="button" aria-label="Imagen anterior" disabled hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
          </button>

          <figure id="photoFrame" class="photo-frame">
            <button id="closeViewerButton" class="close-viewer-button" type="button" aria-label="Cerrar visualizador">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
            </button>
            <img id="placeholderImage" class="placeholder-image" src="assets/placeholder.jpeg" alt="">
            <div id="imageViewport" class="image-viewport is-hidden">
              <img id="activeImage" alt="">
              <video id="activeVideo" class="is-hidden" controls playsinline></video>
              <div class="image-overlay" aria-hidden="true">
                <span id="activePosition" class="overlay-text overlay-right"></span>
              </div>
              <div id="zoomSelection" class="zoom-selection is-hidden" aria-hidden="true"></div>
              <div class="controls" aria-label="Controles del visualizador">
                <div class="control-group control-group-primary">
                  <button id="playButton" class="icon-button" type="button" disabled aria-label="Reproducir">
                    <i class="fa-solid fa-play" aria-hidden="true"></i>
                  </button>
                  <button id="stopButton" class="icon-button" type="button" disabled aria-label="Detener">
                    <i class="fa-solid fa-stop" aria-hidden="true"></i>
                  </button>
                  <button id="shuffleButton" class="icon-button" type="button" disabled aria-label="Aleatorio" aria-pressed="false">
                    <i class="fa-solid fa-shuffle" aria-hidden="true"></i>
                  </button>
                </div>
                <div class="control-group control-group-tools">
                  <button id="zoomOutButton" class="icon-button" type="button" disabled aria-label="Alejar">
                    <i class="fa-solid fa-magnifying-glass-minus" aria-hidden="true"></i>
                  </button>
                  <button id="resetZoomButton" class="button zoom-value" type="button" disabled>100%</button>
                  <button id="zoomInButton" class="icon-button" type="button" disabled aria-label="Acercar">
                    <i class="fa-solid fa-magnifying-glass-plus" aria-hidden="true"></i>
                  </button>
                  <button id="fullscreenButton" class="icon-button" type="button" disabled aria-label="Pantalla completa">
                    <i class="fa-solid fa-expand" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
            </div>
          </figure>

          <nav id="folderNav" class="folder-nav is-hidden" aria-label="Subcarpetas"></nav>

          <button id="nextButton" class="nav-button next is-hidden" type="button" aria-label="Imagen siguiente" disabled hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
          </button>
        </section>
      </section>

      <footer class="bottom-bar">
        <div class="bottom-actions">
          <button id="serverButton" class="button primary" type="button">Elegir una carpeta de imágenes</button>
          <label id="browserFolderLink" class="text-link">
            Abrir sin servidor
            <input id="folderInput" type="file" accept="image/*,video/mp4,video/quicktime,video/mpeg,.m4v,.mov,.mp4,.mpeg,.mpg,.avif" webkitdirectory multiple>
          </label>
          <span id="browserFolderWarning" class="inline-warning is-hidden">Evita carpetas demasiado grandes en este modo.</span>
        </div>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
